
# Лабораторная работа №1 - gRPC ProductCatalog
## Все файлы проекта с полными комментариями

### 📄 Файл: `product.proto`

```protobuf
// Указываем версию Protocol Buffers
syntax = "proto3";

// Задаем пространство имен для избежания конфликтов
package product;

// Определяем gRPC сервис с методами
service ProductCatalog {
  // RPC метод: принимает ID товара, возвращает детальную информацию
  rpc GetProductDetails (ProductID) returns (ProductResponse) {}
}

// Сообщение для передачи ID товара
message ProductID {
  // Номер поля 1, тип int32
  int32 id = 1;
}

// Сообщение с полной информацией о товаре
message ProductResponse {
  int32 id = 1;          // Уникальный идентификатор товара
  string name = 2;       // Название товара
  string description = 3;// Описание товара
  float price = 4;       // Цена товара
  bool in_stock = 5;     // Наличие на складе (true/false)
}
```

