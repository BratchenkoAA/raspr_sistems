### 🖥️ Файл: `server.py`

```python
# Импорт библиотек
import grpc
from concurrent import futures
import product_pb2
import product_pb2_grpc
import random

# Функция для генерации тестовой базы данных товаров (в памяти)
def generate_products_db():
    """
    Создает словарь с 50 товарами для имитации базы данных.
    Каждый товар содержит название, описание, цену и наличие.
    """
    db = {}  # Пустой словарь для хранения товаров
    categories = ["Laptop", "Smartphone", "Headphones", "Mouse", "Keyboard"]  # Категории товаров
    
    # Генерируем 50 товаров с ID от 1 до 50
    for i in range(1, 51):
        category = random.choice(categories)  # Случайная категория
        db[i] = {
            "name": f"{category} Model {i}",                    # Название: категория + модель
            "description": f"Description for {category} Model {i}",  # Описание
            "price": round(random.uniform(50.0, 1500.0), 2),    # Случайная цена от 50 до 1500
            "in_stock": random.choice([True, False])            # Случайное наличие (да/нет)
        }
    return db  # Возвращаем заполненную базу данных

# Создаем базу данных при запуске сервера
PRODUCTS_DB = generate_products_db()


# Класс реализации сервиса ProductCatalog
class ProductCatalogService(product_pb2_grpc.ProductCatalogServicer):
    """
    Реализация методов, объявленных в product.proto.
    Наследуется от автоматически сгенерированного класса.
    """
    
    def GetProductDetails(self, request, context):
        """
        Обрабатывает запрос на получение информации о товаре.
        
        Параметры:
        - request: объект ProductID с полем id
        - context: контекст RPC для работы с метаданными и ошибками
        
        Возвращает:
        - ProductResponse с данными о товаре
        """
        product_id = request.id  # Извлекаем ID из запроса
        print(f"Сервер: Получен запрос для ID = {product_id}")
        
        # Проверяем наличие товара в базе данных
        if product_id in PRODUCTS_DB:
            product_info = PRODUCTS_DB[product_id]  # Получаем информацию о товаре
            
            # Создаем и заполняем объект ответа
            response = product_pb2.ProductResponse(
                id=product_id,
                name=product_info["name"],
                description=product_info["description"],
                price=product_info["price"],
                in_stock=product_info["in_stock"]
            )
            print(f"Сервер: Отправлен ответ для ID = {product_id}")
            return response
        else:
            # Если товар не найден, возвращаем ошибку NOT_FOUND
            print(f"Сервер: Товар с ID = {product_id} не найден")
            context.set_code(grpc.StatusCode.NOT_FOUND)           # Устанавливаем код ошибки
            context.set_details(f"Product with id {product_id} not found")  # Описание ошибки
            return product_pb2.ProductResponse()  # Возвращаем пустой ответ


# Функция запуска сервера
def serve():
    """
    Настраивает и запускает gRPC сервер.
    """
    # Создаем сервер с пулом потоков (макс. 10 одновременных запросов)
    server = grpc.server(futures.ThreadPoolExecutor(max_workers=10))
    
    # Регистрируем наш сервис на сервере
    product_pb2_grpc.add_ProductCatalogServicer_to_server(
        ProductCatalogService(), server
    )
    
    # Настраиваем адрес и порт для прослушивания
    listen_addr = '[::]:50052'  # Слушаем все интерфейсы на порту 50052
    server.add_insecure_port(listen_addr)  # Добавляем незащищенный порт
    
    print(f"Сервер: Запуск на порту {listen_addr}")
    server.start()  # Запускаем сервер
    print("Сервер: Ожидание подключений...")
    server.wait_for_termination()  # Блокируем основной поток до остановки сервера


# Точка входа при запуске файла
if __name__ == '__main__':
    serve()  # Запускаем сервер
```

### 💻 Файл: `client.py`

```python
# Импорт библиотек
import grpc
import product_pb2
import product_pb2_grpc


# Основная функция клиента
def run():
    """
    Запускает клиента для взаимодействия с сервером.
    Позволяет вводить ID товаров и получать информацию.
    """
    # Создаем незащищенный канал связи с сервером
    channel = grpc.insecure_channel('localhost:50052')
    print("Клиент: Подключение к localhost:50052")
    
    # Создаем заглушку (stub) для вызова методов сервера
    stub = product_pb2_grpc.ProductCatalogStub(channel)
    
    # Бесконечный цикл для ввода нескольких ID
    while True:
        try:
            # Запрашиваем ввод у пользователя
            user_input = input("\nКлиент: Введите ID товара (или 'exit' для выхода): ")
            
            # Проверка на выход из программы
            if user_input.lower() == 'exit':
                break
            
            # Преобразуем ввод в число
            product_id = int(user_input)
            
            # Создаем запрос с указанным ID
            request = product_pb2.ProductID(id=product_id)
            
            # Вызываем метод сервера и получаем ответ
            response = stub.GetProductDetails(request)
            
            # Проверяем, найден ли товар (проверяем наличие названия)
            if response.name:
                # Выводим информацию о товаре
                print("\n--- Информация о товаре ---")
                print(f"ID:          {response.id}")
                print(f"Название:    {response.name}")
                print(f"Описание:    {response.description}")
                print(f"Цена:        ${response.price:.2f}")
                print(f"В наличии:   {'Да' if response.in_stock else 'Нет'}")
                print("----------------------------")
            else:
                print(f"Клиент: Товар с ID {product_id} не найден на сервере.")
                
        except grpc.RpcError as e:
            # Обработка ошибок gRPC
            print(f"Ошибка gRPC: {e.code()} - {e.details()}")
        except ValueError:
            # Обработка ошибок ввода
            print("Ошибка: Введите корректное числовое значение ID.")
        except Exception as e:
            # Обработка прочих ошибок
            print(f"Произошла ошибка: {e}")


# Точка входа при запуске файла
if __name__ == '__main__':
    run()  # Запускаем клиента
```

